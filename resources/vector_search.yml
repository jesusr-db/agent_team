resources:
  vector_search_endpoints:
    vs_endpoint:
      name: qa-chatbot-vs-endpoint

  vector_search_indexes:
    doc_chunks_index:
      name: ${var.catalog}.${var.schema}.doc_chunks_vs_index
      endpoint_name: qa-chatbot-vs-endpoint
      primary_key: chunk_id
      index_type: DELTA_SYNC
      delta_sync_index_spec:
        source_table: ${var.catalog}.${var.schema}.doc_chunks
        pipeline_type: TRIGGERED
        embedding_source_columns:
          - name: chunk_text
            embedding_model_endpoint_name: databricks-bge-large-en
