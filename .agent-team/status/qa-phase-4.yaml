# =========================================================================
# Success Criteria Validation (from .agent-team/artifacts/success-criteria.yaml)
# =========================================================================
success_criteria:
  - name: documents_ingested
    phase: 1
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      src/ingestion/ingest_docs.py defines a DLT streaming table 'raw_documents'
      using Auto Loader (cloudFiles format) reading from /Volumes/${catalog}/${schema}/source_docs.
      Pipeline resource (resources/pipelines.yml) references this notebook.
      Volume resource 'source_docs' is defined as MANAGED for document upload.

  - name: chunk_schema_complete
    phase: 1
    priority: critical
    result: PASS
    evidence: >
      src/transformations/chunk_docs.py defines DLT table 'doc_chunks' with columns:
      chunk_id (STRING), doc_source (STRING), chunk_text (STRING), chunk_index (INT),
      metadata (STRING). This exactly matches the data-to-genai contract schema.
      The UDF schema definition and .select() columns both produce the correct shape.

  - name: embeddings_generated
    phase: 2
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      resources/vector_search.yml defines a DELTA_SYNC index on doc_chunks table
      with embedding_source_columns pointing to chunk_text and embedding model
      databricks-bge-large-en. The index is configured for TRIGGERED sync mode.
      src/genai/config.py sets VS_INDEX_NAME and VS_ENDPOINT_NAME correctly.
      rag_chain.py retrieve_chunks() queries the index with query_text parameter.

  - name: rag_endpoint_serving
    phase: 2
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      resources/serving.yml defines model_serving_endpoint 'qa-chatbot-rag' with
      served entity referencing ${catalog}.${schema}.qa_chatbot_rag_model.
      src/genai/rag_chain.py implements model_serving_handler() which accepts
      the genai-to-app contract request shape and returns the contract response shape.
      Auto-capture config enabled for inference logging.

  - name: answer_includes_sources
    phase: 2
    priority: high
    result: PASS
    evidence: >
      rag_chain.py answer_question() returns {"answer": str, "sources": [{"doc_source": ...,
      "chunk_text": ..., "relevance_score": ...}]}. The sources list is populated from
      retrieve_chunks() results. model_serving_handler() wraps this into the contract
      response shape with sources array in each choice. Frontend App.tsx renders
      sources with doc_source path and relevance_score percentage.

  - name: chat_ui_loads
    phase: 3
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      src/app/frontend/src/App.tsx renders a chat interface with header "Documentation Q&A",
      message list, input form with text input and Send button. main.tsx mounts the
      React app. api.ts handles POST /chat requests. Backend main.py serves frontend
      static files from dist/ directory when built. The chat input element is present
      (input type="text" with placeholder "Ask a question about the documentation...").

  - name: end_to_end_flow
    phase: 3
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      Full flow verified structurally: User types question in App.tsx -> sendChatMessage()
      in api.ts POSTs to /chat -> FastAPI chat() endpoint in main.py forwards to
      RAG serving endpoint via WorkspaceClient -> serving endpoint calls
      model_serving_handler() in rag_chain.py -> retrieve_chunks() queries Vector Search
      -> format_context() builds prompt -> generate_answer() calls Foundation Model
      -> response with sources returned -> frontend renders answer + sources.
      tests/integration/test_end_to_end.py has 14 tests validating this flow.

  - name: response_latency
    phase: 3
    priority: high
    result: PASS_STRUCTURAL
    evidence: >
      Architecture designed for sub-10s responses. Token budget ~3734 (well under
      model limits). Top-5 chunk retrieval is a single Vector Search API call.
      No heavy pre/post processing in the backend proxy. Scale-to-zero enabled
      on serving endpoint means first request may be slower but subsequent
      requests within the serving window will be fast.

  - name: deployed_as_app
    phase: 4
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      resources/app.yml defines a Databricks App resource 'qa_chatbot_app' with
      name 'qa-chatbot-app', source_code_path pointing to src/app/backend,
      uvicorn command configured, environment variables for RAG_SERVING_ENDPOINT,
      CATALOG, and SCHEMA. databricks bundle validate confirms this resource
      is valid. deployment would provision it via 'databricks bundle deploy'.

  - name: app_accessible
    phase: 4
    priority: critical
    result: PASS_STRUCTURAL
    evidence: >
      resources/app.yml includes permissions section granting CAN_USE to 'users' group.
      The app serves the React frontend as static files (main.py mounts StaticFiles
      from frontend/dist). CORS middleware allows all origins. When deployed,
      the app URL is accessible to all workspace users with CAN_USE permission.

