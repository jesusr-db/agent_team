      name: qa-chatbot-vs-endpoint

    - type: Vector Search Index
      name: main.qa_chatbot_dev.doc_chunks_vs_index
      source_table: main.qa_chatbot_dev.doc_chunks
      embedding_model: databricks-bge-large-en
      sync_mode: TRIGGERED

    - type: Databricks App
      name: "[dev jesus_rodriguez] qa-chatbot-app"
      source: src/app/backend
      env:
        RAG_SERVING_ENDPOINT: qa-chatbot-rag
        CATALOG: main
        SCHEMA: qa_chatbot_dev

  workflow: >
    1. databricks bundle deploy --target dev
       - Creates/updates all resources in the dev workspace path
       - Pipeline runs in development mode (faster iteration, no production scheduling)
       - Serving endpoint and app names auto-prefixed with [dev username]
    2. Upload sample docs: databricks fs cp docs/ dbfs:/Volumes/main/qa_chatbot_dev/source_docs/
    3. Run pipeline: databricks bundle run doc_ingestion_pipeline --target dev
    4. Trigger VS index sync (automatic after pipeline completes)
    5. Test app: databricks apps get [dev username] qa-chatbot-app
