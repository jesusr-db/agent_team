deploy_plan:
  description: >
    What 'databricks bundle deploy --target dev' would provision:
  resources:
    - type: Pipeline (DLT)
      name: "[dev jesus_rodriguez] qa-chatbot-doc-ingestion"
      catalog: main
      schema: qa_chatbot_dev
      notebooks: ingest_docs.py, chunk_docs.py
      mode: development (auto-prefixed name, development mode enabled)

    - type: Volume
      name: source_docs
      catalog: main
