tables:
  - name: doc_chunks
    catalog: "${var.project_catalog}"
    schema: "${var.project_schema}"
    description: Chunked documentation segments ready for embedding
    columns:
      - name: chunk_id
        type: STRING
        description: Unique identifier for each chunk (UUID)
        required: true
      - name: doc_source
        type: STRING
        description: Source document path or identifier (e.g., "docs/getting-started.md")
        required: true
      - name: chunk_text
        type: STRING
        description: The text content of the chunk (up to ~2000 characters / 512 tokens)
        required: true
      - name: chunk_index
        type: INT
        description: Zero-based position of chunk within its source document
        required: true
      - name: metadata
        type: STRING
        description: >
          JSON-encoded metadata including document title, section headings,
          and any other structural information extracted during ingestion.
          Example: {"title": "Getting Started", "section": "Installation", "headings": ["Getting Started", "Installation"]}
        required: false
    estimated_rows: 500-5000
    partitioning: none
    primary_key: chunk_id

  - name: raw_documents
    catalog: "${var.project_catalog}"
    schema: "${var.project_schema}"
    description: Raw ingested documentation files before chunking
    columns:
      - name: doc_path
        type: STRING
        description: File path of the source document
        required: true
      - name: doc_content
        type: STRING
        description: Full text content of the document
        required: true
      - name: doc_format
        type: STRING
        description: File format (md, txt, rst)
        required: true
      - name: ingested_at
        type: TIMESTAMP
        description: Timestamp when the document was ingested
        required: true
    estimated_rows: 50-500
    partitioning: none
    primary_key: doc_path

vector_indexes:
  - name: doc_chunks_vs_index
    source_table: doc_chunks
    embedding_source_column: chunk_text
    embedding_model_endpoint: databricks-bge-large-en
    embedding_dimension: 1024
    sync_mode: TRIGGERED
    endpoint_type: STANDARD
    description: >
      Vector Search index over doc_chunks for semantic retrieval.
      Uses BGE-large-en embeddings (1024 dimensions) computed automatically
      by the Vector Search service from the chunk_text column.

serving_endpoints:
  - name: qa-chatbot-rag
    description: RAG pipeline endpoint that retrieves relevant chunks and generates answers
    served_models:
      - model_type: custom
        description: Python model that orchestrates retrieval and generation
    environment_variables:
      - VECTOR_SEARCH_ENDPOINT: the Vector Search endpoint name
      - VECTOR_SEARCH_INDEX: the full index name (catalog.schema.index)
      - LLM_ENDPOINT: foundation model endpoint for answer generation

documentation_sources:
  format: Markdown (.md), plain text (.txt), reStructuredText (.rst)
  ingestion_method: Databricks Auto Loader from cloud storage volume
  volume_path: /Volumes/${var.project_catalog}/${var.project_schema}/source_docs
  description: >
    Documentation files are uploaded to a Unity Catalog Volume.
    Auto Loader watches the volume path and incrementally ingests new files.
