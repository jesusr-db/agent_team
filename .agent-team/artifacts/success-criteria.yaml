criteria:
  - name: documents_ingested
    description: All source documents are parsed, chunked, and stored in the doc_chunks Delta table
    validation: "SELECT COUNT(*) FROM ${var.project_catalog}.${var.project_schema}.doc_chunks > 0"
    phase: 1
    priority: critical

  - name: chunk_schema_complete
    description: The doc_chunks table has all required columns (chunk_id, doc_source, chunk_text, chunk_index, metadata)
    validation: "DESCRIBE TABLE ${var.project_catalog}.${var.project_schema}.doc_chunks shows all required columns"
    phase: 1
    priority: critical

  - name: embeddings_generated
    description: Vector Search index is populated and queryable with at least one result for a test query
    validation: "Vector Search endpoint returns results for test query 'how to get started'"
    phase: 2
    priority: critical

  - name: rag_endpoint_serving
    description: The RAG model serving endpoint is deployed and responding
    validation: "POST to /serving-endpoints/qa-chatbot-rag/invocations returns HTTP 200"
    phase: 2
    priority: critical

  - name: answer_includes_sources
    description: Generated answers include source document references
    validation: "Response JSON contains non-empty 'sources' array with doc_source fields"
    phase: 2
    priority: high

  - name: chat_ui_loads
    description: Chat interface is accessible and renders correctly
    validation: "HTTP 200 from app endpoint, page contains chat input element"
    phase: 3
    priority: critical

  - name: end_to_end_flow
    description: A question submitted through the chat UI returns a sourced answer
    validation: "Submit question via UI, receive response with answer text and source references"
    phase: 3
    priority: critical

  - name: response_latency
    description: End-to-end response time from question to answer is under 10 seconds
    validation: "Measure time from question submission to answer display < 10000ms"
    phase: 3
    priority: high

  - name: deployed_as_app
    description: Application is deployed as a Databricks App and accessible via workspace URL
    validation: "databricks apps get qa-chatbot returns RUNNING status"
    phase: 4
    priority: critical

  - name: app_accessible
    description: Deployed app is reachable by workspace users via the app URL
    validation: "HTTP GET to app URL returns 200 with chat interface"
    phase: 4
    priority: critical
