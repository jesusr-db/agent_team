bundle:
  name: qa-chatbot

workspace:
  profile: DEFAULT

variables:
  catalog:
    description: Unity Catalog catalog name
    default: main
  schema:
    description: Unity Catalog schema name
    default: qa_chatbot

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: main
      schema: qa_chatbot_dev

  staging:
    variables:
      catalog: main
      schema: qa_chatbot_staging

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: qa_chatbot
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
      - group_name: users
        level: CAN_VIEW
